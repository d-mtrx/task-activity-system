<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Activity System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.socket.io/4.6.2/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: #222222;
      --accent: #e8ff47;
      --accent2: #47ffd4;
      --danger: #ff4747;
      --text: #f0f0f0;
      --muted: #555;
      --pending: #555;
      --inprogress: #e8a847;
      --completed: #47d4a8;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    #app { min-height: 100vh; display: flex; flex-direction: column; }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 16px;
      letter-spacing: -0.02em;
      color: var(--accent);
    }
    .logo span { color: var(--text); }

    .ws-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
      transition: color 0.3s;
    }
    .ws-badge.connected { color: var(--accent2); }
    .ws-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .ws-badge.connected .ws-dot {
      background: var(--accent2);
      box-shadow: 0 0 8px var(--accent2);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* AUTH */
    #auth-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .auth-box {
      width: 100%;
      max-width: 360px;
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 40px;
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .auth-title {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
      color: var(--accent);
    }
    .auth-sub { color: var(--muted); font-size: 11px; margin-bottom: 28px; }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      cursor: pointer;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.2s;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input[type="text"], input[type="password"], textarea, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    select option { background: var(--surface); }

    .btn {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: #000;
      border: none;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .error-msg {
      background: rgba(255,71,71,0.1);
      border: 1px solid rgba(255,71,71,0.3);
      color: var(--danger);
      padding: 10px 12px;
      font-size: 11px;
      margin-bottom: 16px;
    }

    /* MAIN LAYOUT */
    #main-screen {
      flex: 1;
      display: none;
      grid-template-columns: 300px 1fr 260px;
      min-height: calc(100vh - 57px);
    }
    #main-screen.visible { display: grid; }

    /* SIDEBAR */
    .sidebar {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .badge {
      background: var(--surface2);
      color: var(--muted);
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
    }

    .create-form {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }
    .create-form .field { margin-bottom: 10px; }

    .filters {
      padding: 10px 20px;
      display: flex;
      gap: 6px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 3px 9px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn.active, .filter-btn:hover { border-color: var(--accent); color: var(--accent); }

    #task-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .task-item {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
      animation: fadeUp 0.25s ease;
      position: relative;
    }
    .task-item:hover { background: var(--surface2); }
    .task-item.selected { background: var(--surface2); border-left: 2px solid var(--accent); padding-left: 18px; }

    .task-item-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 5px;
    }
    .task-title {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 13px;
      line-height: 1.3;
      flex: 1;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .status-dot.pending    { background: var(--pending); }
    .status-dot.in-progress { background: var(--inprogress); box-shadow: 0 0 6px var(--inprogress); }
    .status-dot.completed  { background: var(--completed); }

    .task-meta { font-size: 10px; color: var(--muted); display: flex; gap: 10px; }

    .status-label.pending    { color: var(--muted); }
    .status-label.in-progress { color: var(--inprogress); }
    .status-label.completed  { color: var(--completed); }

    /* DETAIL */
    .main-panel { overflow-y: auto; display: flex; flex-direction: column; }
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 8px;
    }
    .empty-icon { font-size: 32px; opacity: 0.2; }
    .empty-text { font-family: 'Syne', sans-serif; font-size: 13px; }

    #task-detail { padding: 32px; animation: fadeUp 0.2s ease; }

    .detail-status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .detail-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 26px;
      line-height: 1.2;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }
    .detail-desc { color: var(--muted); font-size: 13px; line-height: 1.7; margin-bottom: 24px; white-space: pre-wrap; }
    .detail-meta { font-size: 10px; color: var(--muted); margin-bottom: 24px; display: flex; flex-direction: column; gap: 3px; }

    .status-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .status-btn {
      padding: 8px 16px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .status-btn:hover { border-color: var(--accent); color: var(--accent); }
    .status-btn.current { border-color: var(--accent); color: var(--accent); background: rgba(232,255,71,0.05); }
    .status-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ACTIVITY */
    .activity-panel {
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #activity-feed {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .activity-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(10px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .activity-event {
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .activity-event.created { color: var(--accent2); }
    .activity-event.updated { color: var(--inprogress); }
    .activity-task-title {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 12px;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .activity-meta { font-size: 10px; color: var(--muted); }
    .activity-empty { padding: 24px 16px; color: var(--muted); font-size: 11px; text-align: center; }

    /* USER BAR */
    .user-bar { display: flex; align-items: center; gap: 10px; }
    .user-name { font-size: 11px; color: var(--muted); }
    .user-name span { color: var(--accent); }
    .logout-btn {
      padding: 4px 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

    .new-tag {
      position: absolute;
      top: 8px; right: 8px;
      background: var(--accent);
      color: #000;
      font-size: 9px;
      font-weight: 700;
      padding: 1px 5px;
      letter-spacing: 0.06em;
      animation: fadeOut 3s forwards;
    }
    @keyframes fadeOut {
      0%, 60% { opacity: 1; }
      100% { opacity: 0; }
    }

    .loading { padding: 20px; text-align: center; color: var(--muted); font-size: 11px; }
    textarea { min-height: 64px; }
    .section-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
<div id="app">

  <header>
    <div class="logo">TASK<span>SYS</span></div>
    <div id="ws-status" class="ws-badge">
      <div class="ws-dot"></div>
      <span>websocket disconnected</span>
    </div>
    <div class="user-bar" id="user-bar" style="display:none">
      <div class="user-name">logged in as <span id="username-display"></span></div>
      <button class="logout-btn" onclick="logout()">logout</button>
    </div>
  </header>

  <!-- AUTH -->
  <div id="auth-screen">
    <div class="auth-box">
      <div class="auth-title">TASKSYS</div>
      <div class="auth-sub">real-time task management · demo</div>
      <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">Login</div>
        <div class="tab" onclick="switchTab('register')">Register</div>
      </div>
      <div id="auth-error" class="error-msg" style="display:none"></div>
      <div class="field">
        <label>Username</label>
        <input type="text" id="auth-username" placeholder="alice" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="auth-password" placeholder="••••••••"
          onkeydown="if(event.key==='Enter') submitAuth()" />
      </div>
      <button class="btn" id="auth-btn" onclick="submitAuth()">LOGIN</button>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main-screen">

    <!-- LEFT: CREATE + LIST -->
    <div class="sidebar">
      <div class="create-form">
        <div class="section-label">New Task</div>
        <div class="field">
          <label>Title</label>
          <input type="text" id="new-title" placeholder="Task title..." />
        </div>
        <div class="field">
          <label>Description</label>
          <textarea id="new-desc" placeholder="Optional..."></textarea>
        </div>
        <button class="btn" onclick="createTask()">+ CREATE TASK</button>
      </div>

      <div class="filters">
        <button class="filter-btn active" onclick="setFilter(null, this)">all</button>
        <button class="filter-btn" onclick="setFilter('pending', this)">pending</button>
        <button class="filter-btn" onclick="setFilter('in-progress', this)">in-progress</button>
        <button class="filter-btn" onclick="setFilter('completed', this)">completed</button>
      </div>

      <div class="panel-header">
        <span class="panel-title">Tasks</span>
        <span class="badge" id="task-count">0</span>
      </div>

      <div id="task-list">
        <div class="loading">loading...</div>
      </div>
    </div>

    <!-- CENTER: DETAIL -->
    <div class="main-panel">
      <div class="empty-state" id="empty-detail">
        <div class="empty-icon">◈</div>
        <div class="empty-text">select a task</div>
      </div>
      <div id="task-detail" style="display:none"></div>
    </div>

    <!-- RIGHT: LIVE FEED -->
    <div class="activity-panel">
      <div class="panel-header">
        <span class="panel-title">Live Feed</span>
        <span class="badge" id="event-count">0</span>
      </div>
      <div id="activity-feed">
        <div class="activity-empty">waiting for events...</div>
      </div>
    </div>

  </div>
</div>

<script>
  const API = 'https://task-activity-system-production.up.railway.app';

  let token = localStorage.getItem('token') || null;
  let username = localStorage.getItem('username') || null;
  let tasks = [];
  let selectedTaskId = null;
  let activeFilter = null;
  let socket = null;
  let eventCount = 0;
  let authMode = 'login';

  window.onload = () => { if (token) showMain(); };

  // AUTH
  function switchTab(mode) {
    authMode = mode;
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && mode === 'login') || (i === 1 && mode === 'register'));
    });
    document.getElementById('auth-btn').textContent = mode === 'login' ? 'LOGIN' : 'REGISTER';
    document.getElementById('auth-error').style.display = 'none';
  }

  async function submitAuth() {
    const u = document.getElementById('auth-username').value.trim();
    const p = document.getElementById('auth-password').value.trim();
    if (!u || !p) return showAuthError('Username and password required');
    const btn = document.getElementById('auth-btn');
    btn.disabled = true; btn.textContent = '...';
    try {
      const res = await fetch(`${API}/auth/${authMode}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: u, password: p })
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json.error || 'Auth failed');
      token = json.data.token;
      username = json.data.username;
      localStorage.setItem('token', token);
      localStorage.setItem('username', username);
      showMain();
    } catch (e) {
      showAuthError(e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = authMode === 'login' ? 'LOGIN' : 'REGISTER';
    }
  }

  function showAuthError(msg) {
    const el = document.getElementById('auth-error');
    el.textContent = msg; el.style.display = 'block';
  }

  function logout() {
    token = null; username = null;
    localStorage.removeItem('token'); localStorage.removeItem('username');
    if (socket) socket.disconnect();
    document.getElementById('main-screen').classList.remove('visible');
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('user-bar').style.display = 'none';
  }

  function showMain() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('main-screen').classList.add('visible');
    document.getElementById('user-bar').style.display = 'flex';
    document.getElementById('username-display').textContent = username;
    loadTasks();
    connectSocket();
  }

  // TASKS
  async function loadTasks() {
    try {
      const params = activeFilter ? `?status=${activeFilter}` : '';
      const res = await fetch(`${API}/tasks${params}`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const json = await res.json();
      tasks = json.data || [];
      renderTaskList();
      document.getElementById('task-count').textContent = json.pagination?.total ?? tasks.length;
    } catch {
      document.getElementById('task-list').innerHTML = '<div class="loading">failed to load</div>';
    }
  }

  function renderTaskList() {
    const list = document.getElementById('task-list');
    if (!tasks.length) {
      list.innerHTML = '<div class="loading">no tasks yet</div>';
      return;
    }
    list.innerHTML = tasks.map(t => `
      <div class="task-item ${t.id === selectedTaskId ? 'selected' : ''}"
           onclick="selectTask('${t.id}')">
        <div class="task-item-header">
          <div class="task-title">${esc(t.title)}</div>
          <div class="status-dot ${t.status}"></div>
        </div>
        <div class="task-meta">
          <span class="status-label ${t.status}">${t.status}</span>
          <span>${timeAgo(t.created_at)}</span>
        </div>
      </div>
    `).join('');
  }

  async function createTask() {
    const title = document.getElementById('new-title').value.trim();
    const description = document.getElementById('new-desc').value.trim();
    if (!title) return;
    try {
      const res = await fetch(`${API}/tasks`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ title, description })
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json.error);
      document.getElementById('new-title').value = '';
      document.getElementById('new-desc').value = '';
      loadTasks();
    } catch (e) { alert(e.message); }
  }

  function selectTask(id) {
    selectedTaskId = id;
    renderTaskList();
    const task = tasks.find(t => t.id === id);
    if (task) renderDetail(task);
  }

  function renderDetail(task) {
    document.getElementById('empty-detail').style.display = 'none';
    const el = document.getElementById('task-detail');
    el.style.display = 'block';
    el.innerHTML = `
      <div class="detail-status-row">
        <div class="status-dot ${task.status}" style="width:10px;height:10px"></div>
        <span class="status-label ${task.status}" style="font-size:11px;letter-spacing:0.06em;text-transform:uppercase">${task.status}</span>
      </div>
      <div class="detail-title">${esc(task.title)}</div>
      <div class="detail-desc">${esc(task.description || '—')}</div>
      <div class="detail-meta">
        <span>id: ${task.id}</span>
        <span>created: ${new Date(task.created_at).toLocaleString()}</span>
        <span>updated: ${new Date(task.updated_at).toLocaleString()}</span>
      </div>
      <div class="section-label">Update Status</div>
      <div class="status-actions">
        ${['pending','in-progress','completed'].map(s => `
          <button class="status-btn ${task.status === s ? 'current' : ''}"
                  ${task.status === s ? 'disabled' : ''}
                  onclick="updateStatus('${task.id}','${s}')">
            ${s}
          </button>
        `).join('')}
      </div>
    `;
  }

  async function updateStatus(id, status) {
    try {
      const res = await fetch(`${API}/tasks/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ status })
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json.error);
      await loadTasks();
      const updated = tasks.find(t => t.id === id);
      if (updated) renderDetail(updated);
    } catch (e) { alert(e.message); }
  }

  function setFilter(status, btn) {
    activeFilter = status;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadTasks();
  }

  // WEBSOCKET
  function connectSocket() {
    socket = io(API, { auth: { token }, transports: ['websocket', 'polling'] });

    socket.on('connect', () => {
      const el = document.getElementById('ws-status');
      el.className = 'ws-badge connected';
      el.querySelector('span').textContent = 'websocket connected';
    });

    socket.on('disconnect', () => {
      const el = document.getElementById('ws-status');
      el.className = 'ws-badge';
      el.querySelector('span').textContent = 'websocket disconnected';
    });

    socket.on('task:created', (event) => {
      pushActivity(event, 'created');
      loadTasks();
    });

    socket.on('task:updated', (event) => {
      pushActivity(event, 'updated');
      loadTasks();
      if (selectedTaskId === event.payload.id) renderDetail(event.payload);
    });
  }

  function pushActivity(event, type) {
    eventCount++;
    document.getElementById('event-count').textContent = eventCount;

    const feed = document.getElementById('activity-feed');
    const empty = feed.querySelector('.activity-empty');
    if (empty) empty.remove();

    const item = document.createElement('div');
    item.className = 'activity-item';
    item.innerHTML = `
      <div class="activity-event ${type}">task:${type}</div>
      <div class="activity-task-title">${esc(event.payload.title)}</div>
      <div class="activity-meta">
        by ${esc(event.actorUsername)} · ${new Date(event.timestamp).toLocaleTimeString()}
        ${type === 'updated' ? `<br>→ ${event.payload.status}` : ''}
      </div>
    `;
    feed.insertBefore(item, feed.firstChild);

    setTimeout(() => {
      const taskEl = document.querySelector(`[onclick="selectTask('${event.payload.id}')"]`);
      if (taskEl && !taskEl.querySelector('.new-tag')) {
        const tag = document.createElement('div');
        tag.className = 'new-tag';
        tag.textContent = type === 'created' ? 'NEW' : 'UPD';
        taskEl.appendChild(tag);
        setTimeout(() => tag.remove(), 3000);
      }
    }, 100);
  }

  // UTILS
  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function timeAgo(date) {
    const s = Math.floor((Date.now() - new Date(date)) / 1000);
    if (s < 60) return `${s}s ago`;
    if (s < 3600) return `${Math.floor(s/60)}m ago`;
    if (s < 86400) return `${Math.floor(s/3600)}h ago`;
    return `${Math.floor(s/86400)}d ago`;
  }
</script>
</body>
</html>
